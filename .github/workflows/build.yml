name: Build Workflow

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

env:
  # Instruct GitHub Actions runners to use Node 24 for all Javascript actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build & Verify APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '9.3.1'
          validate-wrappers: false

      - name: Regenerate Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          gradle wrapper

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Decode Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            echo "Decoding debug.keystore.base64..."
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "debug.keystore.base64 not found, falling back to default debug signing."
          fi

      - name: Build Debug App
        # Explicit headless option and process isolation to fully prevent AWT/IntelliJ NullPointerException during CLI compile
        run: ./gradlew assembleDebug --no-daemon --max-workers=1 -Djava.awt.headless=true -Dkotlin.compiler.execution.strategy=out-of-process

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
