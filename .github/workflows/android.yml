name: Android CI Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    name: Build & Compile APK
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Decode Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            echo "Decoding debug.keystore.base64..."
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "debug.keystore.base64 not found, falling back to default debug signing."
          fi

      - name: Clean Build
        run: ./gradlew clean

      - name: Run Build (Compile Debug APK)
        run: ./gradlew assembleDebug --no-daemon --max-workers=1 --no-build-cache

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SmartFileCloudManager-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
