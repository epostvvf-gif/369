name: Android CI Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    name: Build & Compile APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Download clean Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar "https://github.com/gradle/gradle/raw/v8.5/gradle/wrapper/gradle-wrapper.jar" || gradle wrapper --gradle-version 9.3.1

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Run Build (Compile Debug APK)
        run: ./gradlew assembleDebug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartFileCloudManager-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
