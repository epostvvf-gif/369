name: Android CI Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build & Compile APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'
          validate-wrappers: false

      - name: Regenerate Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          gradle wrapper

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Decode Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            echo "Decoding debug.keystore.base64..."
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "debug.keystore.base64 not found, falling back to default debug signing."
          fi

      - name: Run Build (Compile Debug APK)
        run: ./gradlew assembleDebug --no-daemon --max-workers=1

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartFileCloudManager-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
